name: CI

# Kalite kapısı: her push ve PR'da tip kontrolü + lint + test (Y-6).
# Bozuk tip / lint hatası / kırık test main'e sızamaz.
#
# NOT: `npm ci` package-lock.json'ı BİREBİR kurar — geliştiricinin yerel
# node_modules'ı ile lock'un ayrışması (bu kapı yokken vuetify v3/v4
# uyuşmazlığını aylarca gizleyen durum) böyle yakalanır.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ŞART — typecheck'ten ÖNCE gelmeli.
      # `computed`, `ref`, `useFormat` gibi isimler unplugin-auto-import ile
      # global geliyor; TİPLERİ src/auto-imports.d.ts ve src/components.d.ts'te.
      # Bu iki dosya ÜRETİLİR (vite.config: dts) ve git'te izlenmez — üretilmiş
      # dosya commit'lenmez, yoksa kaynakla sessizce ayrışır (kök dizinde tam
      # bunun olduğu iki stale kopya vardı, temizlendi).
      # Vite'ın plugin'i dts'i buildStart'ta yazar; `vite optimize` yetmez.
      # Temiz bir checkout'ta bu adım olmadan vue-tsc 400+ "Cannot find name"
      # hatası verir. Build ~3sn ve bonus olarak paketlemeyi de doğrular.
      - name: Generate auto-import types
        run: npx vite build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Coverage'lı koşu: saf mantık (.ts) için taban eşikleri de doğrular
      # (vitest.config.ts thresholds) — örtülü kod eklenince kapı kırmızıya döner.
      - name: Test
        run: npm run test:coverage

  # Rust kalite kapısı — src-tauri/. Bu iş OLMADAN, para yazan en kritik katman
  # (tx.rs transactional outbox, 7 test) CI'ın TAMAMEN dışındaydı: bir regresyon
  # main'e sızabilirdi. Artık fmt + clippy + test yeşil olmadan geçilemez.
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7

      # tauri crate'i webkit2gtk vb.'ye LİNK eder — testleri derlemek için bile
      # bu sistem kütüphaneleri şart (release.yml ile aynı liste).
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential curl wget file libssl-dev libgtk-3-dev

      # Sürüm rust-toolchain.toml ile hizalı (elle güncellenir).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      # target/ ve registry önbelleği — soğuk derleme ~dakikalar, sıcak ~saniyeler.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      # cargo audit burada: Cargo.lock src-tauri/'de (kök değil), bu iş de zaten
      # o dizinde çalışıyor. Prebuilt binary (taiki-e) — kaynaktan derlemek dakikalar.
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo audit (RustSec advisories)
        run: cargo audit

  # Tedarik zinciri kapısı — bilinen CVE'li bir bağımlılık sürümü sızmasın.
  # Kalite kapısından AYRI iş: bir güvenlik danışması, kodda hiçbir şey
  # değişmeden yayınlanabilir; bu iş onu bir sonraki push/PR'da yakalar.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # SADECE üretime giden bağımlılıklar (--omit=dev): happy-dom/vitest gibi
      # geliştirme araçlarının açıkları paketlenen uygulamaya girmez, PR'ları
      # gereksiz kırmasın. Eşik "high": yüksek/kritik bir prod açığı kapıyı kapatır;
      # moderate olanları dependabot PR olarak yönetir.
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
