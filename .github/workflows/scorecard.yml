name: Scorecard supply-chain security

# OpenSSF Scorecard: depo güvenlik duruşunu otomatik puanlar (branch koruması,
# pinlenmiş action'lar, token izinleri, tehlikeli workflow kalıpları, bilinen
# açıklar vb.). Bulgular Security → Code scanning'e SARIF olarak düşer; sonuçlar
# yayınlanınca README'deki Scorecard rozeti dolar.
on:
  # Branch koruma kuralı değişince yeniden değerlendir.
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 1'
  push:
    branches: [main]

# En az ayrıcalık: iş düzeyinde yalnız gerekenler yükseltiliyor (aşağıda).
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # SARIF sonuçlarını Code scanning'e yüklemek için.
      security-events: write
      # publish_results için OIDC token (imzalı yayın).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          # Sonuçları OpenSSF'nin public API'sine yayınla → README rozeti çalışır.
          publish_results: true

      # Ham SARIF'i artefakt olarak sakla (inceleme/indirme için).
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Code scanning'e yükle → Security sekmesinde bulgular görünür.
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
